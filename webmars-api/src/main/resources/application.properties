spring.application.name=webmars-api
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/webmars}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL:none}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
jwt.secret=${JWT_SECRET}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.enabled=true
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/webmars}
spring.flyway.user=${DB_USER:postgres}
spring.flyway.password=${DB_PASSWORD}
spring.security.user.name=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.jpa.open-in-view=false
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
